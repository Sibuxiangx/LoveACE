name: Build macOS Desktop

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build, sign, notarize, staple, and upload artifacts only
        required: false
        default: true
        type: boolean
      changelog:
        description: Release changelog
        required: false
        default: ""
        type: string
      content:
        description: OTA dialog content
        required: false
        default: ""
        type: string
      force:
        description: Force OTA update
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact_name: ${{ steps.version.outputs.artifact_name }}
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Read desktop version
        id: version
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          text = Path('pubspec.yaml').read_text()
          match = re.search(r'^version:\s*([0-9]+\.[0-9]+\.[0-9]+)', text, re.MULTILINE)
          if not match:
              raise SystemExit('Cannot read version from desktop/pubspec.yaml')

          version = match.group(1)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as output:
              output.write(f'version={version}\n')
              output.write(f'artifact_name=loveace-macos-{version}\n')
          print(f'Desktop version: {version}')
          PY

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze desktop project
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path('/tmp/loveace_developer_id.p12').write_bytes(
              base64.b64decode(os.environ['MACOS_CERTIFICATE_BASE64'])
          )
          PY

          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/loveace_developer_id.p12 \
            -k build.keychain \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$MACOS_KEYCHAIN_PASSWORD" \
            build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Prepare App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          mkdir -p "$HOME/private_keys"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_P8" > "$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          chmod 600 "$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

      - name: Configure Developer ID signing
        run: |
          CERT_IDENTITY=$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/Developer ID Application/ {print $2; exit}')
          if [ -z "$CERT_IDENTITY" ]; then
            echo "Developer ID Application certificate not found" >&2
            exit 1
          fi
          echo "Using signing identity: $CERT_IDENTITY"
          export CERT_IDENTITY
          echo "CERT_IDENTITY=$CERT_IDENTITY" >> "$GITHUB_ENV"

          python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path('macos/Runner.xcodeproj/project.pbxproj')
          text = path.read_text()
          text = text.replace('CODE_SIGN_STYLE = Automatic;', 'CODE_SIGN_STYLE = Manual;')
          text = text.replace('"CODE_SIGN_IDENTITY[sdk=macosx*]" = "Apple Development";', f'"CODE_SIGN_IDENTITY[sdk=macosx*]" = "{os.environ["CERT_IDENTITY"]}";')
          text = text.replace('DEVELOPMENT_TEAM = 2PYK4BY5P6;', 'DEVELOPMENT_TEAM = "${{ secrets.APPLE_TEAM_ID }}";')
          text = text.replace('PROVISIONING_PROFILE_SPECIFIER = "";', 'PROVISIONING_PROFILE_SPECIFIER = "";')
          path.write_text(text)
          PY

      - name: Build macOS release
        run: |
          flutter build macos --release --config-only
          xcodebuild \
            -workspace macos/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath build/macos \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            build

      - name: Sign app bundle with Developer ID
        run: |
          APP_PATH="build/macos/Build/Products/Release/loveace.app"
          ENTITLEMENTS="macos/Runner/Release.entitlements"
          export APP_PATH ENTITLEMENTS
          plutil -lint "$ENTITLEMENTS"
          if plutil -extract keychain-access-groups raw -o - "$ENTITLEMENTS" >/dev/null 2>&1; then
            echo "Release entitlements must not contain keychain-access-groups for Developer ID builds" >&2
            exit 1
          fi

          while IFS= read -r item; do
            codesign --force --timestamp --options runtime --sign "$CERT_IDENTITY" "$item"
          done < <(find "$APP_PATH" \( -name "*.framework" -o -name "*.dylib" \))
          codesign --force --timestamp --options runtime --entitlements "$ENTITLEMENTS" --sign "$CERT_IDENTITY" "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          python3 - <<'PY'
          import os
          import subprocess

          app_path = os.environ['APP_PATH']
          entitlements = subprocess.check_output(
              ['codesign', '-d', '--entitlements', ':-', app_path],
              stderr=subprocess.DEVNULL,
          ).decode('utf-8', errors='replace')
          if 'keychain-access-groups' in entitlements:
              raise SystemExit('Signed Developer ID app must not contain keychain-access-groups')
          PY

      - name: Notarize and staple app
        timeout-minutes: 30
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_PATH="build/macos/Build/Products/Release/loveace.app"
          NOTARY_ZIP="build/macos/loveace-$VERSION-notary.zip"
          RELEASE_ZIP="build/macos/loveace-$VERSION.zip"
          KEY_PATH="$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

          ditto -c -k --keepParent "$APP_PATH" "$NOTARY_ZIP"

          xcrun notarytool submit "$NOTARY_ZIP" \
            --key "$KEY_PATH" \
            --key-id "$APP_STORE_CONNECT_API_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_API_ISSUER_ID" \
            --wait \
            --output-format json > build/macos/notary-submit.json

          SUBMISSION_ID=$(python3 -c "import json; print(json.load(open('build/macos/notary-submit.json'))['id'])")
          STATUS=$(python3 -c "import json; print(json.load(open('build/macos/notary-submit.json'))['status'])")
          echo "Notary submission id: $SUBMISSION_ID"
          echo "Notary status: $STATUS"
          printf '%s\n' "$SUBMISSION_ID" > build/macos/notary-submission-id.txt
          if [ "$STATUS" != "Accepted" ]; then
            xcrun notarytool log "$SUBMISSION_ID" \
              --key "$KEY_PATH" \
              --key-id "$APP_STORE_CONNECT_API_KEY_ID" \
              --issuer "$APP_STORE_CONNECT_API_ISSUER_ID" || true
            exit 1
          fi

          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          spctl --assess --type execute --verbose "$APP_PATH"

          rm -f "$RELEASE_ZIP"
          ditto -c -k --keepParent "$APP_PATH" "$RELEASE_ZIP"

      - name: Upload app zip artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.version.outputs.artifact_name }}
          path: |
            desktop/build/macos/loveace-${{ steps.version.outputs.version }}.zip
            desktop/build/macos/notary-submit.json
            desktop/build/macos/notary-submission-id.txt

      - name: Confirm dry run
        run: |
          echo "Dry run: ${{ inputs.dry_run }}"
          echo "OTA/manifest publishing is skipped when dry_run is true."

  upload-manifest:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ inputs.dry_run == false }}
    environment: S3

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download app zip artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ./release

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Publish macOS release
        env:
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
          CDN_BASE_URL: ${{ secrets.CDN_BASE_URL }}
        run: |
          uv run python cli.py release \
            --version "${{ needs.build.outputs.version }}" \
            --platform macos \
            --file "../../../release/loveace-${{ needs.build.outputs.version }}.zip" \
            --content "${{ inputs.content }}" \
            --changelog "${{ inputs.changelog }}" \
            ${{ inputs.force && '--force' || '' }}
        working-directory: android/tools/publish
