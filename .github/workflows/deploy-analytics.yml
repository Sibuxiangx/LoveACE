name: Deploy Analytics Server

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Check Python server
        working-directory: analytics-server
        run: |
          uv sync
          uv run ruff check app
          uv run basedpyright

      - name: Build Docker images
        run: |
          docker build -t loveace-analytics-api:latest analytics-server
          docker pull postgres:16-alpine
          docker save loveace-analytics-api:latest postgres:16-alpine | gzip > analytics-images.tar.gz

      - name: Install coscli
        run: |
          curl -fsSL -o coscli https://cosbrowser.cloud.tencent.com/software/coscli/coscli-linux-amd64
          chmod 755 coscli
          ./coscli --version

      - name: Configure COS
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ vars.COS_BUCKET }}
          COS_REGION: ${{ vars.COS_REGION }}
        run: |
          cat > cos.yaml <<EOF
          cos:
            base:
              secretid: $COS_SECRET_ID
              secretkey: $COS_SECRET_KEY
              sessiontoken: ""
              protocol: https
            buckets:
            - name: $COS_BUCKET
              alias: analytics
              region: $COS_REGION
              endpoint: cos.$COS_REGION.myqcloud.com
              ofs: false
          EOF

      - name: Upload image archive to COS
        env:
          ARTIFACT_KEY: ${{ vars.ANALYTICS_ARTIFACT_KEY }}
        run: |
          ./coscli cp analytics-images.tar.gz "cos://analytics/$ARTIFACT_KEY" -c cos.yaml
          SIGNED_URL=$(./coscli signurl "cos://analytics/$ARTIFACT_KEY" --time 1800 --simple-output -c cos.yaml)
          printf 'SIGNED_URL=%s\n' "$SIGNED_URL" >> "$GITHUB_ENV"

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.ANALYTICS_DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ vars.ANALYTICS_SERVER_HOST }}
          SSH_PORT: ${{ vars.ANALYTICS_SERVER_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/loveace_analytics_deploy
          chmod 600 ~/.ssh/loveace_analytics_deploy
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Prepare deployment files
        env:
          POSTGRES_PASSWORD: ${{ secrets.ANALYTICS_POSTGRES_PASSWORD }}
          DATABASE_URL: ${{ secrets.ANALYTICS_DATABASE_URL }}
          ANALYTICS_API_KEY: ${{ secrets.ANALYTICS_API_KEY }}
          ANALYTICS_SIGNING_SECRET: ${{ secrets.ANALYTICS_SIGNING_SECRET }}
          ANALYTICS_HASH_SALT: ${{ secrets.ANALYTICS_HASH_SALT }}
          IP_HASH_SALT: ${{ secrets.ANALYTICS_IP_HASH_SALT }}
        run: |
          mkdir -p .deploy/analytics-server
          rsync -a --exclude '.env' --exclude '.venv' --exclude '__pycache__' --exclude '.ruff_cache' analytics-server/ .deploy/analytics-server/
          cat > .deploy/analytics-server/.env <<EOF
          POSTGRES_PASSWORD=$POSTGRES_PASSWORD
          DATABASE_URL=$DATABASE_URL
          ANALYTICS_API_KEY=$ANALYTICS_API_KEY
          ANALYTICS_SIGNING_SECRET=$ANALYTICS_SIGNING_SECRET
          ANALYTICS_HASH_SALT=$ANALYTICS_HASH_SALT
          IP_HASH_SALT=$IP_HASH_SALT
          LOG_LEVEL=INFO
          EOF

      - name: Upload deployment files
        env:
          SSH_HOST: ${{ vars.ANALYTICS_SERVER_HOST }}
          SSH_USER: ${{ vars.ANALYTICS_SERVER_USER }}
          SSH_PORT: ${{ vars.ANALYTICS_SERVER_PORT }}
          SERVER_PATH: ${{ vars.ANALYTICS_SERVER_PATH }}
        run: |
          ssh -i ~/.ssh/loveace_analytics_deploy -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p '$SERVER_PATH'"
          rsync -az --delete -e "ssh -i ~/.ssh/loveace_analytics_deploy -p $SSH_PORT" .deploy/analytics-server/ "$SSH_USER@$SSH_HOST:$SERVER_PATH/"

      - name: Download images on server and restart services
        env:
          SSH_HOST: ${{ vars.ANALYTICS_SERVER_HOST }}
          SSH_USER: ${{ vars.ANALYTICS_SERVER_USER }}
          SSH_PORT: ${{ vars.ANALYTICS_SERVER_PORT }}
          SERVER_PATH: ${{ vars.ANALYTICS_SERVER_PATH }}
        run: |
          ssh -i ~/.ssh/loveace_analytics_deploy -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "cd '$SERVER_PATH' && curl --fail --location --retry 3 --connect-timeout 20 --output analytics-images.tar.gz '$SIGNED_URL' && gzip -dc analytics-images.tar.gz | docker load && docker compose up -d --no-build && rm -f analytics-images.tar.gz"

      - name: Health check
        env:
          SSH_HOST: ${{ vars.ANALYTICS_SERVER_HOST }}
          SSH_USER: ${{ vars.ANALYTICS_SERVER_USER }}
          SSH_PORT: ${{ vars.ANALYTICS_SERVER_PORT }}
          SERVER_PORT: ${{ vars.ANALYTICS_SERVER_LOCAL_PORT }}
        run: |
          ssh -i ~/.ssh/loveace_analytics_deploy -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "curl --fail --silent --show-error 'http://127.0.0.1:$SERVER_PORT/healthz'"

      - name: Delete image archive from COS
        if: success()
        env:
          ARTIFACT_KEY: ${{ vars.ANALYTICS_ARTIFACT_KEY }}
        run: |
          ./coscli rm "cos://analytics/$ARTIFACT_KEY" --force -c cos.yaml
