name: Build APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: Android version to publish, for example 1.1.11
        required: true
        type: string
      changelog:
        description: Release changelog
        required: true
        type: string
      content:
        description: OTA dialog content
        required: false
        default: ""
        type: string
      force:
        description: Force OTA update
        required: false
        default: false
        type: boolean
      dry_run:
        description: Build and upload APK artifacts without publishing OTA
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build: ${{ steps.version.outputs.build }}
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Android version
        id: version
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          text = Path('app/build.gradle.kts').read_text('utf-8')
          version = re.search(r'versionName\s*=\s*"([^"]+)"', text)
          build = re.search(r'versionCode\s*=\s*(\d+)', text)
          if not version or not build:
              raise SystemExit('Cannot read Android versionName/versionCode')
          if version.group(1) != os.environ['REQUESTED_VERSION']:
              raise SystemExit(
                  f"Requested version {os.environ['REQUESTED_VERSION']} does not match "
                  f"Gradle versionName {version.group(1)}"
              )
          with open(os.environ['GITHUB_OUTPUT'], 'a') as output:
              output.write(f'version={version.group(1)}\n')
              output.write(f'build={build.group(1)}\n')
          PY

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Restore release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > app/loveace-release.jks

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_FILE: loveace-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANALYTICS_API_KEY: ${{ secrets.ANALYTICS_API_KEY }}
          ANALYTICS_SIGNING_SECRET: ${{ secrets.ANALYTICS_SIGNING_SECRET }}
          ANALYTICS_HASH_SALT: ${{ secrets.ANALYTICS_HASH_SALT }}
        run: ./gradlew assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v5
        with:
          name: loveace-release-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Confirm dry run
        if: ${{ inputs.dry_run }}
        run: echo "Dry run enabled; APK artifacts were built and uploaded without publishing OTA."

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ inputs.dry_run == false }}
    environment: S3
    concurrency:
      group: loveace-manifest-publish
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download release APK
        uses: actions/download-artifact@v5
        with:
          name: loveace-release-apk
          path: ./release

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Publish Android release
        env:
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
          CDN_BASE_URL: https://release.loveace.top
        run: |
          uv run python cli.py release \
            --version "${{ needs.build.outputs.version }}" \
            --build "${{ needs.build.outputs.build }}" \
            --platform android \
            --file ../../release/app-release.apk \
            --content "${{ inputs.content }}" \
            --changelog "${{ inputs.changelog }}" \
            ${{ inputs.force && '--force' || '' }}
        working-directory: utils/manifest_v2
