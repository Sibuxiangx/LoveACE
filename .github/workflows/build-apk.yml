name: Build APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: Android version to publish, for example 1.1.11
        required: true
        type: string
      changelog:
        description: Release changelog
        required: true
        type: string
      content:
        description: OTA dialog content
        required: false
        default: ""
        type: string
      force:
        description: Force OTA update
        required: false
        default: false
        type: boolean
      dry_run:
        description: Build and upload APK artifacts without publishing OTA
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Restore release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > app/loveace-release.jks

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build release APK
        env:
          ANDROID_KEYSTORE_FILE: loveace-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANALYTICS_API_KEY: ${{ secrets.ANALYTICS_API_KEY }}
          ANALYTICS_SIGNING_SECRET: ${{ secrets.ANALYTICS_SIGNING_SECRET }}
          ANALYTICS_HASH_SALT: ${{ secrets.ANALYTICS_HASH_SALT }}
        run: ./gradlew assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v5
        with:
          name: loveace-release-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Publish Android release
        if: ${{ !inputs.dry_run }}
        env:
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
          CDN_BASE_URL: ${{ secrets.CDN_BASE_URL }}
        run: |
          uv run python cli.py release \
            --version "${{ inputs.version }}" \
            --platform android \
            --file ../../app/build/outputs/apk/release/app-release.apk \
            --content "${{ inputs.content }}" \
            --changelog "${{ inputs.changelog }}" \
            ${{ inputs.force && '--force' || '' }}
        working-directory: android/tools/publish

      - name: Confirm dry run
        if: ${{ inputs.dry_run }}
        run: echo "Dry run enabled; APK artifacts were built and uploaded without publishing OTA."
