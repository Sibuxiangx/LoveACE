name: Deploy Release Metadata

on:
  workflow_dispatch:
    inputs:
      action:
        description: Metadata action
        required: true
        default: bootstrap
        type: choice
        options:
          - bootstrap
          - deploy-page
          - clear-notice

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: S3
    concurrency:
      group: loveace-manifest-publish
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Bootstrap manifests
        if: ${{ inputs.action == 'bootstrap' }}
        env:
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
          CDN_BASE_URL: https://release.loveace.top
        run: uv run python cli.py bootstrap
        working-directory: utils/manifest_v2

      - name: Deploy download pages
        if: ${{ inputs.action == 'deploy-page' }}
        env:
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
          CDN_BASE_URL: https://release.loveace.top
        run: uv run python cli.py deploy-page
        working-directory: utils/manifest_v2

      - name: Clear download notice
        if: ${{ inputs.action == 'clear-notice' }}
        env:
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
          CDN_BASE_URL: https://release.loveace.top
        run: uv run python cli.py clear-notice
        working-directory: utils/manifest_v2
