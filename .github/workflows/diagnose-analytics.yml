name: 诊断遥测链路

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: analytics-worker/package-lock.json

      - name: 安装依赖
        run: npm ci
        working-directory: analytics-worker

      - name: 发送合成事件
        env:
          ANALYTICS_API_KEY: ${{ secrets.ANALYTICS_API_KEY }}
          ANALYTICS_SIGNING_SECRET: ${{ secrets.ANALYTICS_SIGNING_SECRET }}
          ANALYTICS_ENDPOINT: https://analyst-api.linota.cn/v1/events
        run: node scripts/send-test-event.mjs
        working-directory: analytics-worker

      - name: 查询入库结果
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute loveace-analytics --remote --command \
            "SELECT COUNT(*) AS total_events, MAX(created_at) AS last_event_at FROM analytics_events;"
        working-directory: analytics-worker
