name: Sync Semesters

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    environment: S3
    concurrency:
      group: loveace-manifest-publish
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Publish semester data into manifest v2
        env:
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
          CDN_BASE_URL: https://release.loveace.top
        run: uv run python cli.py sync-semesters
        working-directory: utils/manifest_v2
