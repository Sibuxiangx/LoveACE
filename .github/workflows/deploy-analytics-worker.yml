name: Deploy Analytics Worker

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analytics-worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: analytics-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Ensure R2 archive bucket exists
        run: npx wrangler r2 bucket create loveace-analytics-archive || true

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply loveace-analytics --remote

      - name: Deploy Worker
        run: npm run deploy

      - name: Configure Worker secrets
        env:
          ANALYTICS_API_KEY: ${{ secrets.ANALYTICS_API_KEY }}
          ANALYTICS_SIGNING_SECRET: ${{ secrets.ANALYTICS_SIGNING_SECRET }}
          ANALYTICS_IP_HASH_SALT: ${{ secrets.ANALYTICS_IP_HASH_SALT }}
        run: |
          printf '%s' "$ANALYTICS_API_KEY" | npx wrangler secret put ANALYTICS_API_KEY
          printf '%s' "$ANALYTICS_SIGNING_SECRET" | npx wrangler secret put ANALYTICS_SIGNING_SECRET
          printf '%s' "$ANALYTICS_IP_HASH_SALT" | npx wrangler secret put ANALYTICS_IP_HASH_SALT
