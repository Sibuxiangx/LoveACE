name = "loveace-analytics"
main = "src/index.ts"
compatibility_date = "2026-06-12"
workers_dev = false

routes = [
  { pattern = "analyst-api.loveace.top", custom_domain = true }
]

[assets]
directory = "./public"
binding = "ASSETS"

[vars]
MAX_BODY_BYTES = "32768"
MAX_EVENTS_PER_REQUEST = "50"
NONCE_TTL_SECONDS = "600"
RATE_LIMIT_PER_MINUTE = "60"
TIMESTAMP_SKEW_SECONDS = "300"
BI_CACHE_TTL_SECONDS = "60"
RAW_RETENTION_DAYS = "1"
ROLLUP_BATCH_SIZE = "5000"
ROLLUP_MAX_BATCHES = "10"
ARCHIVE_BATCH_SIZE = "5000"
ARCHIVE_MAX_BATCHES = "10"

[triggers]
crons = ["*/5 * * * *"]

[[migrations]]
tag = "v2"
deleted_classes = ["SmartSelectSession"]

[[d1_databases]]
binding = "DB"
database_name = "loveace-analytics"
database_id = "6a58a4ca-21af-4cc4-8c2a-6101865c7985"

[[r2_buckets]]
binding = "ANALYTICS_ARCHIVE"
bucket_name = "loveace-analytics-archive"
